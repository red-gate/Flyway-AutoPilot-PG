name: GitHub - PostgreSQL Pipeline Validation Workflow (Docker)
on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-validation]
  pull_request:
    branches:
      - release
      - 'feature/*'

jobs:
  setup-validation-environment:
    name: Spin Up PostgreSQL Container
    runs-on: self-hosted
    env:
      IMAGE_NAME: "${{ vars.IMAGE_NAME }}"
      POSTGRES_PASSWORD: "DatabaseDevOps!"
      HOST_PORT: "${{ vars.CONTAINER_PORT }}"
      CONTAINER_NAME: "${{ vars.CONTAINER_NAME }}-${{ github.run_number }}"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker availability
        run: docker version || echo "Docker not found, please install before running this workflow."

      - name: Force cleanup any previous container using this port or name
        run: |
          echo "Checking for existing container named $CONTAINER_NAME or using port $HOST_PORT..."

          # Stop & remove any container matching the name
          if [ "$(docker ps -aq -f name=$CONTAINER_NAME)" ]; then
            echo "Found container $CONTAINER_NAME — stopping and removing it..."
            docker stop $CONTAINER_NAME || true
            docker rm -f $CONTAINER_NAME || true
          fi

          # Also detect any container occupying the same port (even if name differs)
          PORT_CONTAINER=$(docker ps --filter "publish=$HOST_PORT" --format "{{.Names}}")
          if [ -n "$PORT_CONTAINER" ]; then
            echo "Found container using port $HOST_PORT ($PORT_CONTAINER) — stopping and removing it..."
            docker stop $PORT_CONTAINER || true
            docker rm -f $PORT_CONTAINER || true
          fi

          echo "Pre-clean complete. Port $HOST_PORT is now free."

      - name: Pull PostgreSQL image
        run: docker pull $IMAGE_NAME

      - name: Start PostgreSQL container
        run: |
          docker run -d --rm \
            --name $CONTAINER_NAME \
            --label "workflow_run=${GITHUB_RUN_ID}" \
            -e POSTGRES_PASSWORD=$POSTGRES_PASSWORD \
            -p $HOST_PORT:5432 \
            $IMAGE_NAME

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..30}; do
            docker exec $CONTAINER_NAME pg_isready -U postgres && break
            echo "Waiting for PostgreSQL to start ($i/30)..."
            sleep 5
          done

      - name: Copy and run database scripts
        run: |
          docker cp "${GITHUB_WORKSPACE}/Scripts/1. CreateAutoPilotDatabases.sql" $CONTAINER_NAME:/tmp/"1. CreateAutoPilotDatabases.sql"
          docker cp "${GITHUB_WORKSPACE}/Scripts/2. CreateAutoPilotInitialSchemas.sql" $CONTAINER_NAME:/tmp/"2. CreateAutoPilotInitialSchemas.sql"

          echo "Running CreateAutoPilotDatabases.sql..."
          docker exec $CONTAINER_NAME bash -c "psql -U postgres -f '/tmp/1. CreateAutoPilotDatabases.sql'"

          echo "Running CreateAutoPilotInitialSchemas.sql against autopilot_dev..."
          docker exec $CONTAINER_NAME bash -c "psql -U postgres -d autopilot_dev -f '/tmp/2. CreateAutoPilotInitialSchemas.sql'"

      - name: Export connection info for Flyway
        run: |
          echo "dbUser=postgres" >> "$GITHUB_ENV"
          echo "dbPassword=$POSTGRES_PASSWORD" >> "$GITHUB_ENV"
          echo "instance=localhost,$HOST_PORT" >> "$GITHUB_ENV"

  Validate-Flyway-Pipeline:
    if: github.repository_owner == 'RG-AutoPilot'  # Only runs if the repo is in a specific organisation
    name: Run Flyway Pipeline
    needs: setup-validation-environment
    uses: ./.github/workflows/GitHub-Flyway-CICD-Pipeline.yml
    secrets: inherit  # Inherit existing secrets but allow environment overrides

  cleanup:
    name: Cleanup PostgreSQL Container
    runs-on: "self-hosted"
    needs: Validate-Flyway-Pipeline
    if: always()
    env:
      CONTAINER_NAME: "${{ vars.CONTAINER_NAME }}-${{ github.run_number }}"
    steps:
      - name: Stop and remove container
        run: |
          echo "Cleaning up container $CONTAINER_NAME"
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true
