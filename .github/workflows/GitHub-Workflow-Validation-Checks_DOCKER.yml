# ===========================
# Pipeline Name: GitHub-Workflow-Validation-Checks_DOCKER.yml
# Version: 1.0.2
# Author: Chris Hawkins (Redgate Software Ltd)
# Last Updated: 2025-11-04
# Description: GitHub Pipeline Validation Workflow (Use Case - To validate all future changes to the Autopilot repository in an automated way)
# ===========================

name: GitHub - FastTrack Pipeline Validation Workflow (Docker)
on:
  workflow_dispatch:  # Allows manual triggering
  repository_dispatch:
    types: [trigger-validation]  # Listens for dispatch events, which can trigger this workflow automatically on regular schedules
  pull_request:
    branches:
      - release  # Triggers on PRs to release
      - 'feature/*'  # Triggers on PRs to any feature branch
  # schedule:
  #   - cron: "0 2 * * *"  # Runs at 3 AM UTC

###
 ### Navigate to Settings > Secrets & Variables > Actions
 # IMAGE_NAME: Enter the name of the RGClone Image to be used
 # CONTAINER_NAME: Enter the name of the container to be created
 # CONTAINER_PORT: Enter the local port number to be used by the proxy command
### End of Environment Variables ###
    
jobs:
  setup-validation-environment:
    name: Spin Up SQL Server Container
    runs-on: "self-hosted"
    env:
      IMAGE_NAME: "${{ vars.IMAGE_NAME }}"
      SA_PASSWORD: "DatabaseDevOps!"
      HOST_PORT: "${{ vars.CONTAINER_PORT }}"
      BASE_CONTAINER_NAME: "${{ vars.RGCLONE_CONTAINER_NAME }}"
      CONTAINER_NAME: "${{ vars.CONTAINER_NAME }}-${{ github.run_number }}"
      DB_INIT_SCRIPT: "${{ github.workspace }}/Scripts/CreateAutopilotDatabases.sql"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker availability
        run: docker version || echo "Docker not found, please install before running this workflow."

      - name: Check if port is in use and free it
        run: |
          echo "Checking if port $HOST_PORT is in use..."
          if lsof -i :$HOST_PORT &>/dev/null; then
            echo "Port $HOST_PORT is in use. Checking for container..."
            EXISTING_CONTAINER=$(docker ps --filter "publish=$HOST_PORT" --format "{{.Names}}")
            if [ -n "$EXISTING_CONTAINER" ]; then
              echo "Stopping and removing container using port $HOST_PORT ($EXISTING_CONTAINER)..."
              docker stop "$EXISTING_CONTAINER" || true
              docker rm "$EXISTING_CONTAINER" || true
            else
              echo "No Docker container found using port $HOST_PORT, killing any process..."
              PID=$(lsof -ti :$HOST_PORT)
              kill -9 $PID || true
            fi
          else
            echo "Port $HOST_PORT is free."
          fi

      - name: Pull Docker Image (if not local)
        run: |
          if [[ "$IMAGE_NAME" == local/* ]]; then
            echo "Skipping pull for local image: $IMAGE_NAME"
          else
            docker pull "$IMAGE_NAME"
          fi
      
      - name: Start Docker Container
        run: |
          echo "Starting container on port $HOST_PORT..."
          docker run -d --rm \
            --name $CONTAINER_NAME \
            -e "ACCEPT_EULA=Y" \
            -e "SA_PASSWORD=$SA_PASSWORD" \
            -p $HOST_PORT:1433 \
            $IMAGE_NAME

      - name: Wait for container startup
        run: |
          echo "Waiting 10 seconds for container to finish starting..."
          sleep 15

      - name: Check or install sqlcmd
        run: |
          if docker exec $CONTAINER_NAME bash -c "[ -x /opt/mssql-tools/bin/sqlcmd ]"; then
            echo "sqlcmd already installed."
          else
            echo "sqlcmd missing — installing..."
            docker exec -u root $CONTAINER_NAME bash -c "\
              apt-get update && \
              apt-get install -y curl gnupg2 apt-transport-https && \
              curl https://packages.microsoft.com/keys/microsoft.asc | apt-key add - && \
              curl https://packages.microsoft.com/config/ubuntu/20.04/prod.list > /etc/apt/sources.list.d/mssql-tools.list && \
              apt-get update && \
              ACCEPT_EULA=Y apt-get install -y mssql-tools unixodbc-dev && \
              echo 'export PATH=$PATH:/opt/mssql-tools/bin' >> /root/.bashrc \
            "
          fi

      - name: Copy database creation script into container
        run: |
          docker cp "${GITHUB_WORKSPACE}/Scripts/CreateAutopilotDatabases.sql" $CONTAINER_NAME:/tmp/CreateAutopilotDatabases.sql

      - name: Initialize databases
        run: |
          echo "Running database initialization script..."
          for i in {1..10}; do
            if docker exec $CONTAINER_NAME /opt/mssql-tools/bin/sqlcmd \
              -S localhost -U sa -P "$SA_PASSWORD" \
              -i /tmp/CreateAutopilotDatabases.sql; then
              echo "Database initialization succeeded."
              exit 0
            fi
            echo "Initialization failed, retrying ($i/10)..."
            sleep 10
          done

          echo "Database initialization failed after retries"
          docker logs $CONTAINER_NAME
          exit 1

      - name: Export connection info for Flyway
        run: |
          echo "dbUser=sa" >> "$GITHUB_ENV"
          echo "dbPassword=$SA_PASSWORD" >> "$GITHUB_ENV"
          echo "instance=localhost,$HOST_PORT" >> "$GITHUB_ENV"

  Validate-Flyway-Pipeline:
    if: github.repository_owner == 'RG-AutoPilot'  # Only runs if the repo is in a specific organisation
    name: Run Flyway Pipeline
    needs: setup-validation-environment
    uses: ./.github/workflows/GitHub-Flyway-CICD-Pipeline.yml
    secrets: inherit  # Inherit existing secrets but allow environment overrides

  cleanup:
    name: Cleanup SQL Server Container
    runs-on: "self-hosted"
    needs: Validate-Flyway-Pipeline
    if: always()
    env:
      CONTAINER_NAME: "${{ vars.CONTAINER_NAME }}-${{ github.run_number }}"
    steps:
      - name: Stop and remove container
        run: |
          echo "Cleaning up container $CONTAINER_NAME"
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true
